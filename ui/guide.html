<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureCVisor Single Edge Guide</title>

<link rel="stylesheet" href="vendor/pretendard/pretendard.css?v=1.0">
<style>

:root {
  --bg-sidebar: #f7f7f7;
  --bg-content: #ffffff;
  --bg-code: #f4f6f9;
  --bg-hover: #eef1f6;
  --fg: #2c3e50;
  --fg-dim: #5a6566;
  --accent: #1f6390;
  --accent2: #8e44ad;
  --green: #27ae60;
  --yellow: #f39c12;
  --red: #c0392b;
  --border: #dce1e8;

  --font-sans: 'Pretendard', 'Outfit', system-ui, -apple-system, sans-serif;
  --font-display: 'Outfit', 'Pretendard', sans-serif;
  --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --pcv-spring: cubic-bezier(0.16, 1, 0.3, 1);
  --sidebar-w: 300px;
}


.ko { word-break: keep-all; line-height: 1.5; }
.ko-tight { word-break: keep-all; line-height: 1.15; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-content);
  color: var(--fg);
  line-height: 1.5;
  letter-spacing: 0;
  font-size: 14px;
}
.pcv-icon-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
.pcv-icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  flex: none;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}


.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 16px;
}
.topbar .logo {
  font-weight: 700; color: var(--accent); font-size: 15px;
  white-space: nowrap;
}
.topbar .logo span { color: var(--fg-dim); font-weight: 400; font-size: 12px; }
.topbar .search {
  flex: 1; max-width: 400px;
  background: var(--bg-content); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px; color: var(--fg);
  font-size: 13px; outline: none;
}
.topbar .search:focus { border-color: var(--accent); }
.topbar .search::placeholder { color: var(--fg-dim); }
.topbar .version-badge {
  background: var(--accent); color: #fff; padding: 2px 8px;
  border-radius: 4px; font-size: 11px; font-weight: 700;
}
.topbar .back-link {
  color: var(--fg-dim); text-decoration: none; font-size: 12px;
  white-space: nowrap;
}
.topbar .back-link:hover { color: var(--accent); }
.topbar .doc-map-btn {
  color: var(--fg-dim);
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-family: var(--font-sans);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.topbar .doc-map-btn:hover { color: var(--accent); border-color: var(--accent); }
.hamburger { display: none; cursor: pointer; font-size: 20px; color: var(--fg); background: none; border: none; }


.sidebar {
  position: fixed; top: 48px; left: 0; bottom: 0;
  width: var(--sidebar-w); overflow-y: auto;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-chapter {
  padding: 8px 16px; cursor: pointer;
  color: var(--fg); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
  user-select: none;
}
.toc-chapter:hover { background: var(--bg-hover); color: var(--accent); }
.toc-chapter.active {
  background: var(--bg-hover);
  color: var(--accent);
  border-left-color: var(--accent);
}
.toc-chapter .arrow {
  font-size: 10px; transition: transform 0.2s; color: var(--fg-dim);
  flex-shrink: 0;
}
.toc-chapter.expanded .arrow { transform: rotate(90deg); }

.toc-sub {
  display: none; padding-left: 28px;
}
.toc-chapter.expanded + .toc-sub { display: block; }

.toc-sub a {
  display: block; padding: 4px 16px;
  color: var(--fg-dim); font-size: 12px;
  text-decoration: none;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-sub a:hover, .toc-sub a.active { color: var(--accent); }


.content {
  margin-left: var(--sidebar-w);
  margin-top: 48px;
  padding: 32px 48px 64px;
  max-width: 900px;
}


.breadcrumb {
  font-size: 12px; color: var(--fg-dim);
  margin-bottom: 16px;
}
.breadcrumb a,
.content .breadcrumb a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.breadcrumb a:hover { text-decoration: underline; }


.content h1 { font-size: 28px; color: var(--accent); margin: 32px 0 16px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
.content h2 { font-size: 22px; color: var(--accent); margin: 40px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.content h3 { font-size: 17px; color: var(--fg); margin: 24px 0 8px; }
.content h4 { font-size: 14px; color: var(--fg-dim); margin: 16px 0 6px; }


.content p { margin: 10px 0; }
.content ul, .content ol { padding-left: 24px; margin: 8px 0; }
.content li { margin: 4px 0; }


.content code {
  font-family: var(--font-mono); font-size: 12px;
  background: var(--bg-code); color: #c0392b;
  padding: 2px 6px; border-radius: 3px;
}
.content pre {
  background: var(--bg-code); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 16px;
  overflow-x: auto; margin: 12px 0;
  font-size: 12px; line-height: 1.6;
  position: relative;
}
.content pre code {
  background: none; padding: 0; color: #c0392b;
}
.content pre .copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--border); border: none; color: var(--fg-dim);
  padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;
}
.content pre .copy-btn:hover { color: var(--accent); }


.content table {
  width: 100%; border-collapse: collapse; margin: 12px 0;
  font-size: 13px;
}
.content th {
  background: var(--bg-sidebar); color: var(--accent);
  padding: 8px 12px; text-align: left;
  border: 1px solid var(--border);
}
.content td {
  padding: 6px 12px; border: 1px solid var(--border);
}
.content tr:hover td { background: var(--bg-hover); }


.content blockquote {
  position: relative;
  padding: 16px 20px 16px 22px;
  margin: 18px 0;
  background: rgba(31, 99, 144, 0.05);
  border: 1px solid rgba(31, 99, 144, 0.18);
  border-left: 3px solid var(--accent);
  border-radius: 12px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 4px 12px -8px rgba(0, 0, 0, 0.06);
  font-size: 13px;
  color: var(--fg);
  word-break: keep-all;
}
.content blockquote strong { color: var(--accent); font-weight: 700; }
.content blockquote p { margin: 6px 0; }
.content blockquote p:first-child { margin-top: 0; }
.content blockquote p:last-child { margin-bottom: 0; }


.content strong { color: var(--fg); }
.content em { color: var(--fg-dim); font-style: italic; }
.content a { color: var(--accent); text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content p a,
.content li a,
.content blockquote a,
.content td a {
  text-decoration: underline;
  text-underline-offset: 2px;
}
.content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.content del { color: var(--fg-dim); text-decoration: line-through; }
.content img { max-width: 100%; border-radius: 4px; }


.nav-footer {
  display: flex; justify-content: space-between;
  margin-top: 56px; padding-top: 28px;
  border-top: 1px solid var(--border);
  gap: 12px;
}
.nav-btn {
  padding: 14px 22px; border-radius: 999px;
  background: var(--bg-sidebar); border: 1px solid var(--border);
  color: var(--fg); cursor: pointer; font-size: 13px;
  font-weight: 500; font-family: var(--font-sans);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 10px;
  max-width: 320px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: all 0.5s var(--pcv-spring);
  box-shadow: 0 4px 14px -10px rgba(0, 0, 0, 0.1);
}
.nav-btn:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(31, 99, 144, 0.04);
  box-shadow: 0 8px 24px -12px rgba(31, 99, 144, 0.3);
}
.nav-btn.disabled,
.nav-btn:disabled { opacity: 0.3; pointer-events: none; transform: none; }


.search-results {
  position: fixed; top: 48px; left: 50%; transform: translateX(-50%);
  width: 600px; max-height: 400px; overflow-y: auto;
  background: var(--bg-sidebar); border: 1px solid var(--accent);
  border-radius: 8px; padding: 8px; z-index: 200;
  display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.search-results .sr-item {
  padding: 8px 12px; cursor: pointer; border-radius: 4px;
  font-size: 13px;
}
.search-results .sr-item:hover { background: var(--bg-hover); }
.search-results .sr-item .sr-chapter { color: var(--accent); font-weight: 600; }
.search-results .sr-item .sr-text { color: var(--fg-dim); font-size: 12px; margin-top: 2px; }
.search-results mark { background: var(--yellow); color: #000; border-radius: 2px; padding: 0 1px; }


.back-to-top {
  position: fixed; bottom: 24px; right: 24px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; z-index: 50;
  box-shadow: 0 4px 12px rgba(41,128,185,0.3);
  border: none; font-weight: 700;
}
.back-to-top.show { display: flex; }


.loading {
  text-align: center; padding: 80px 0; color: var(--fg-dim);
}
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }


.chapter-count {
  display: inline-block; background: var(--bg-code); color: var(--fg-dim);
  font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: auto;
  flex-shrink: 0;
}


.content h1:hover .anchor,
.content h2:hover .anchor,
.content h3:hover .anchor {
  opacity: 1;
}
.anchor {
  color: var(--accent); text-decoration: none; opacity: 0;
  transition: opacity 0.15s; margin-left: 6px; font-size: 0.8em;
}


@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.3s; z-index: 90; width: 280px; }
  .sidebar.open { transform: translateX(0); }
  .content { margin-left: 0; padding: 24px 16px 48px; }
  .hamburger { display: block; }
  .topbar .search { max-width: 200px; }
  .search-results { width: calc(100% - 32px); left: 16px; transform: none; }
  .topbar .back-link { display: none; }
}
@media (max-width: 480px) {
  .content { padding: 16px 12px 48px; }
  .content h1 { font-size: 22px; }
  .content h2 { font-size: 18px; }
  .content pre { font-size: 11px; padding: 10px; }
}



.guide-hero {
  position: relative;
  padding: 56px 48px 64px;
  margin: -32px -48px 48px;
  background:
    linear-gradient(180deg, #f7faff 0%, #fdfdff 40%, var(--bg-content) 100%);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  font-family: var(--font-sans);
}
.guide-hero::before {
  content: "";
  position: absolute;
  top: -140px; left: -120px;
  width: 440px; height: 440px;
  background: radial-gradient(circle, rgba(31, 99, 144, 0.10), transparent 62%);
  pointer-events: none;
  border-radius: 50%;
  filter: blur(4px);
}
.guide-hero::after {
  content: "";
  position: absolute;
  top: 30%; right: -180px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(142, 68, 173, 0.06), transparent 62%);
  pointer-events: none;
  border-radius: 50%;
  filter: blur(4px);
}
.guide-hero-inner {
  position: relative;
  max-width: 820px;
  z-index: 1;
}
.guide-hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border-radius: 999px;
  background: rgba(31, 99, 144, 0.08);
  border: 1px solid rgba(31, 99, 144, 0.25);
  color: var(--accent);
  font-family: var(--font-display);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 28px;
}
.guide-hero-eyebrow .pcv-icon { font-size: 14px; }

.guide-hero-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5.2vw, 58px);
  font-weight: 800;
  letter-spacing: -0.022em;
  color: var(--fg);
  line-height: 1.1;
  margin: 0 0 20px;
  word-break: keep-all;

  border-bottom: none;
  padding-bottom: 0;
}
.guide-hero-title .accent { color: var(--accent); }

.guide-hero-lede {
  font-size: 17px;
  color: var(--fg-dim);
  max-width: 58ch;
  line-height: 1.7;
  margin: 0 0 36px;
  word-break: keep-all;
}

.guide-hero-meta {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 32px;
  max-width: 720px;
}
.guide-meta-card {
  position: relative;
  background: rgba(255, 255, 255, 0.65);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    0 8px 22px -15px rgba(31, 99, 144, 0.18);
  transition: all 0.5s var(--pcv-spring);
}
.guide-meta-card:hover {
  transform: translateY(-2px);
  border-color: rgba(31, 99, 144, 0.4);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    0 14px 30px -15px rgba(31, 99, 144, 0.28);
}
.guide-meta-card-core {
  background: #ffffff;
  border-radius: calc(16px - 5px);
  padding: 14px 16px;
}
.guide-meta-card .label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}
.guide-meta-card .value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  line-height: 1;
}
.guide-meta-card .unit {
  font-size: 13px;
  color: var(--fg-dim);
  font-weight: 500;
  margin-left: 4px;
}

.guide-hero-ctas {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.guide-hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 14px 24px;
  border-radius: 999px;
  background: var(--accent);
  color: #ffffff;
  text-decoration: none;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 15px;
  border: none;
  cursor: pointer;
  transition: all 0.5s var(--pcv-spring);
  box-shadow: 0 12px 30px -12px rgba(31, 99, 144, 0.55);
}
.guide-hero-cta:hover {
  transform: scale(1.02);
  box-shadow: 0 16px 40px -10px rgba(31, 99, 144, 0.65);
  text-decoration: none;
}
.guide-hero-cta:active { transform: scale(0.98); }
.guide-hero-cta .arrow-wrap {
  width: 34px; height: 34px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.2);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.5s var(--pcv-spring);
}
.guide-hero-cta:hover .arrow-wrap { transform: translateX(4px); }
.guide-hero-cta .arrow-wrap .pcv-icon { color: #fff; font-size: 18px; }

.guide-hero-cta-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: 999px;
  background: transparent;
  color: var(--fg);
  text-decoration: none;
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 14px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.5s var(--pcv-spring);
}
.guide-hero-cta-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(31, 99, 144, 0.04);
  text-decoration: none;
}
.guide-hero-cta-ghost .pcv-icon { font-size: 16px; }

.guide-audience-panel {
  margin: -18px 0 34px;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfcfd;
}
.guide-audience-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.guide-audience-kicker {
  font-size: 11px;
  font-weight: 700;
  color: #0f766e;
  text-transform: uppercase;
  letter-spacing: 0;
}
.guide-audience-title {
  margin-top: 4px;
  font-size: 18px;
  font-weight: 800;
  color: var(--fg);
}
.guide-audience-copy {
  max-width: 420px;
  font-size: 13px;
  color: var(--fg-dim);
  line-height: 1.6;
  text-align: right;
}
.guide-audience-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.guide-audience-card {
  display: block;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--fg);
  text-decoration: none;
  min-height: 148px;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.guide-audience-card:hover {
  text-decoration: none;
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 12px 28px -22px rgba(31, 99, 144, 0.45);
}
.guide-audience-card .label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 24px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(15, 118, 110, 0.09);
  color: #0f766e;
  font-size: 11px;
  font-weight: 800;
}
.guide-audience-card .title {
  margin-top: 12px;
  font-size: 16px;
  font-weight: 800;
  color: var(--fg);
}
.guide-audience-card .body {
  margin-top: 8px;
  font-size: 13px;
  color: var(--fg-dim);
  line-height: 1.55;
}
.guide-audience-card .jump {
  margin-top: 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}

.guide-decision-panel {
  margin: 0 0 38px;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #f8fbfc;
}
.guide-decision-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 16px;
}
.guide-decision-kicker {
  font-size: 11px;
  font-weight: 800;
  color: #0f766e;
  text-transform: uppercase;
  letter-spacing: 0;
}
.guide-decision-title {
  margin-top: 4px;
  font-size: 18px;
  font-weight: 800;
  color: var(--fg);
}
.guide-decision-copy {
  max-width: 470px;
  color: var(--fg-dim);
  font-size: 13px;
  line-height: 1.6;
  text-align: right;
}
.guide-decision-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.guide-decision-card {
  text-align: left;
  min-height: 144px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--fg);
  font-family: var(--font-sans);
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.guide-decision-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 12px 26px -22px rgba(31, 99, 144, 0.45);
}
.guide-decision-card .adr-id,
.adr-ref {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 2px 7px;
  border-radius: 999px;
  border: 1px solid rgba(31, 99, 144, 0.22);
  background: rgba(31, 99, 144, 0.06);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
}
.guide-decision-card .title {
  margin-top: 10px;
  font-size: 15px;
  font-weight: 800;
  color: var(--fg);
}
.guide-decision-card .body {
  margin-top: 7px;
  color: var(--fg-dim);

<script>
(function() {
  'use strict';




  function parseMd(md) {
    var lines = md.split('\n');
    var html = [];
    var inCode = false, codeLang = '', codeLines = [];
    var inTable = false, tableRows = [];
    var inList = false, listType = '', listItems = [];
    var inBlockquote = false, bqLines = [];

    function flushList() {
      if (!inList) return;
      var tag = listType === 'ol' ? 'ol' : 'ul';
      html.push('<' + tag + '>' + listItems.join('') + '</' + tag + '>');
      listItems = []; inList = false;
    }
    function flushTable() {
      if (!inTable) return;
      if (tableRows.length < 2) { tableRows = []; inTable = false; return; }
      var t = '<table><thead><tr>';
      var hdr = tableRows[0];
      for (var ci = 0; ci < hdr.length; ci++) { t += '<th>' + inline(hdr[ci].trim()) + '</th>'; }
      t += '</tr></thead><tbody>';
      for (var ri = 2; ri < tableRows.length; ri++) {
        t += '<tr>';
        for (var ci2 = 0; ci2 < tableRows[ri].length; ci2++) {
          t += '<td>' + inline((tableRows[ri][ci2] || '').trim()) + '</td>';
        }
        t += '</tr>';
      }
      t += '</tbody></table>';
      html.push(t);
      tableRows = []; inTable = false;
    }
    function flushBlockquote() {
      if (!inBlockquote) return;
      html.push('<blockquote>' + bqLines.join('<br>') + '</blockquote>');
      bqLines = []; inBlockquote = false;
    }
    function inline(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/~~([^~]+)~~/g, '<del>$1</del>');
    }

    for (var i = 0; i < lines.length; i++) {
      var L = lines[i];

      if (/^```/.test(L)) {
        if (inCode) {
          var codeText = codeLines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          html.push('<pre><code class="lang-' + esc(codeLang) + '">' + codeText + '</code></pre>');
          codeLines = []; inCode = false; codeLang = '';
        } else {
          flushList(); flushTable(); flushBlockquote();
          inCode = true; codeLang = L.replace(/^```\s*/, '').trim() || 'text';
        }
        continue;
      }
      if (inCode) { codeLines.push(L); continue; }

      if (/^\|/.test(L)) {
        flushList(); flushBlockquote();
        var cells = L.split('|').slice(1);
        if (cells.length > 0 && cells[cells.length - 1].trim() === '') cells.pop();
        if (!inTable) inTable = true;
        tableRows.push(cells);
        continue;
      } else if (inTable) { flushTable(); }

      var hm = L.match(/^(#{1,4})\s+(.*)/);
      if (hm) {
        flushList(); flushBlockquote();
        var lvl = hm[1].length;
        var text = hm[2];
        var id = text.toLowerCase()
          .replace(/[`*\[\]()]/g, '')
          .replace(/[^a-z0-9가-힣\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/^-+|-+$/g, '');
        html.push('<h' + lvl + ' id="' + esc(id) + '">' + inline(text) + '<a class="anchor" href="#' + esc(id) + '">#</a></h' + lvl + '>');
        continue;
      }


      if (/^>\s?/.test(L)) {
        flushList();
        inBlockquote = true;
        bqLines.push(inline(L.replace(/^>\s?/, '')));
        continue;
      } else if (inBlockquote) { flushBlockquote(); }


      if (/^---+$/.test(L)) { flushList(); flushBlockquote(); html.push('<hr>'); continue; }


      var ulm = L.match(/^(\s*)[-*]\s+(.*)/);
      if (ulm) {
        flushBlockquote();
        if (!inList || listType !== 'ul') { flushList(); inList = true; listType = 'ul'; }
        listItems.push('<li>' + inline(ulm[2]) + '</li>');
        continue;
      }

      var olm = L.match(/^(\s*)\d+\.\s+(.*)/);
      if (olm) {
        flushBlockquote();
        if (!inList || listType !== 'ol') { flushList(); inList = true; listType = 'ol'; }
        listItems.push('<li>' + inline(olm[2]) + '</li>');
        continue;
      }


      if (L.trim() === '') { flushList(); flushBlockquote(); continue; }


      flushList(); flushBlockquote();
      html.push('<p>' + inline(L) + '</p>');
    }
    flushList(); flushTable(); flushBlockquote();
    return html.join('\n');
  }




  var chapters = [];
  var currentChapter = 0;
  var guideMd = '';
  var searchTimeout = null;




  function buildToc(md) {
    var lines = md.split('\n');
    chapters = [];
    var current = null;
    for (var i = 0; i < lines.length; i++) {
      var L = lines[i];
      var m2 = L.match(/^## (.*)/);
      if (m2) {
        var title = m2[1].trim();
        var id = title.toLowerCase()
          .replace(/[`*\[\]()]/g, '')
          .replace(/[^a-z0-9가-힣\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/^-+|-+$/g, '');
        current = { title: title, id: id, subs: [] };
        chapters.push(current);
        continue;
      }
      var m3 = L.match(/^### (.*)/);
      if (m3 && current) {
        var st = m3[1].trim();
        var sid = st.toLowerCase()
          .replace(/[`*\[\]()]/g, '')
          .replace(/[^a-z0-9가-힣\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/^-+|-+$/g, '');
        current.subs.push({ title: st, id: sid });
      }
    }
    renderToc();
  }

  function renderToc() {
    var sb = document.getElementById('sidebar');
    var h = '';
    for (var idx = 0; idx < chapters.length; idx++) {
      var ch = chapters[idx];
      var isActive = idx === currentChapter;
      var cls = 'toc-chapter' + (isActive ? ' active expanded' : '');
      h += '<div class="' + cls + '" data-idx="' + idx + '">';
      h += '<span class="arrow">&#9654;</span> <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(ch.title) + '</span>';
      if (ch.subs.length > 0) h += '<span class="chapter-count">' + ch.subs.length + '</span>';
      h += '</div>';
      h += '<div class="toc-sub">';
      for (var si = 0; si < ch.subs.length; si++) {
        h += '<a href="#' + esc(ch.subs[si].id) + '">' + esc(ch.subs[si].title) + '</a>';
      }
      h += '</div>';
    }
    sb.innerHTML = h;


    var tocItems = sb.querySelectorAll('.toc-chapter');
    for (var ti = 0; ti < tocItems.length; ti++) {
      (function(el) {
        el.addEventListener('click', function() {
          var idx = parseInt(el.getAttribute('data-idx'));
          goChapter(idx);
        });
      })(tocItems[ti]);
    }
  }

  function goChapter(idx) {
    if (idx < 0 || idx >= chapters.length) return;
    currentChapter = idx;
    var el = document.getElementById(chapters[idx].id);
    if (el) {
      var topOffset = 48 + 16;
      var elTop = el.getBoundingClientRect().top + window.pageYOffset - topOffset;
      window.scrollTo({ top: elTop, behavior: 'smooth' });
    }
    renderToc();
    try { localStorage.setItem('pcv_guide_chapter', idx); } catch(e) {}

    document.getElementById('sidebar').classList.remove('open');
    updateNavFooter();
  }




  function updateNavFooter() {
    var footer = document.getElementById('nav-footer');
    if (!footer) return;
    var prevBtn = footer.querySelector('.nav-prev');
    var nextBtn = footer.querySelector('.nav-next');
    if (currentChapter <= 0) {
      prevBtn.classList.add('disabled');
      prevBtn.disabled = true;
      prevBtn.setAttribute('aria-label', '이전 장 없음');
      prevBtn.textContent = '';
    } else {
      prevBtn.classList.remove('disabled');
      prevBtn.disabled = false;
      prevBtn.setAttribute('aria-label', '이전 장: ' + chapters[currentChapter - 1].title);
      prevBtn.innerHTML = '&#8592; ' + esc(chapters[currentChapter - 1].title);
    }
    if (currentChapter >= chapters.length - 1) {
      nextBtn.classList.add('disabled');
      nextBtn.disabled = true;
      nextBtn.setAttribute('aria-label', '다음 장 없음');
      nextBtn.textContent = '';
    } else {
      nextBtn.classList.remove('disabled');
      nextBtn.disabled = false;
      nextBtn.setAttribute('aria-label', '다음 장: ' + chapters[currentChapter + 1].title);
      nextBtn.innerHTML = esc(chapters[currentChapter + 1].title) + ' &#8594;';
    }
  }




  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 150);
  });

  function doSearch() {
    var q = searchInput.value.trim().toLowerCase();
    if (q.length < 2) { searchResults.style.display = 'none'; return; }

    var results = [];
    var lines = guideMd.split('\n');
    var currentCh = '';
    var currentChIdx = -1;
    var re;
    try { re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); } catch(e) { return; }

    for (var li = 0; li < lines.length; li++) {
      var L = lines[li];
      var m = L.match(/^## (.*)/);
      if (m) { currentCh = m[1]; currentChIdx++; }
      if (L.toLowerCase().indexOf(q) !== -1 && results.length < 30) {
        results.push({ chapter: currentCh, chIdx: currentChIdx, text: L.substring(0, 150) });
      }
    }

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="sr-item" style="color:var(--fg-dim)">No results found</div>';
    } else {
      var h = '';

      var shown = 0;
      for (var ri = 0; ri < results.length && shown < 20; ri++) {
        var r = results[ri];
        var highlighted = r.text.replace(re, '<mark>$1</mark>');
        h += '<div class="sr-item" data-ch="' + r.chIdx + '">';
        h += '<div class="sr-chapter">' + esc(r.chapter || 'Introduction') + '</div>';
        h += '<div class="sr-text">' + highlighted + '</div>';
        h += '</div>';
        shown++;
      }
      searchResults.innerHTML = h;


      var items = searchResults.querySelectorAll('.sr-item[data-ch]');
      for (var ii = 0; ii < items.length; ii++) {
        (function(item) {
          item.addEventListener('click', function() {
            var chIdx = parseInt(item.getAttribute('data-ch'));
            if (chIdx >= 0) goChapter(chIdx);
            searchResults.style.display = 'none';
            searchInput.value = '';
          });
        })(items[ii]);
      }
    }
    searchResults.style.display = 'block';
  }

  searchInput.addEventListener('blur', function() {
    setTimeout(function() { searchResults.style.display = 'none'; }, 200);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchResults.style.display = 'none';
      searchInput.blur();
    }
  });




  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
      return;
    }
    if (e.target === searchInput) return;
    if (e.key === 'ArrowLeft') goChapter(currentChapter - 1);
    if (e.key === 'ArrowRight') goChapter(currentChapter + 1);
  });




  var btt = document.getElementById('btt');
  btt.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  var scrollDebounce = null;
  window.addEventListener('scroll', function() {
    btt.classList.toggle('show', window.scrollY > 300);

    clearTimeout(scrollDebounce);
    scrollDebounce = setTimeout(function() {

      for (var i = chapters.length - 1; i >= 0; i--) {
        var el = document.getElementById(chapters[i].id);
        if (el && el.getBoundingClientRect().top <= 100) {
          if (currentChapter !== i) {
            currentChapter = i;
            renderToc();
            updateNavFooter();
            try { localStorage.setItem('pcv_guide_chapter', i); } catch(e) {}
          }
          break;
        }
      }
    }, 50);
  });




  document.getElementById('hamburger-btn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
  });


  document.getElementById('content').addEventListener('click', function() {
    document.getElementById('sidebar').classList.remove('open');
  });




  function addCopyButtons() {
    var pres = document.querySelectorAll('.content pre');
    for (var pi = 0; pi < pres.length; pi++) {
      (function(pre) {
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', function() {
          var codeEl = pre.querySelector('code');
          var text = codeEl ? codeEl.textContent : pre.textContent;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() {
              btn.textContent = 'Copied!';
              setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
            });
          } else {

            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
          }
        });
        pre.appendChild(btn);
      })(pres[pi]);
    }
  }




  function initDecisionPanel(contentEl) {
    var decisionBtn = document.getElementById('decision-map-btn');
    if (decisionBtn) {
      decisionBtn.addEventListener('click', function() {
        var target = document.getElementById('guide-decision-map');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    contentEl.addEventListener('click', function(ev) {
      var trigger = ev.target.closest ? ev.target.closest('[data-adr]') : null;
      if (!trigger) return;
      var adrId = trigger.getAttribute('data-adr');
      if (!adrId) return;
      ev.preventDefault();
      openAdrDialog(adrId);
    });

    var backdrop = document.getElementById('adr-dialog-backdrop');
    var closeBtn = document.getElementById('adr-dialog-close');
    if (closeBtn) closeBtn.addEventListener('click', closeAdrDialog);
    if (backdrop) {
      backdrop.addEventListener('click', function(ev) {
        if (ev.target === backdrop) closeAdrDialog();
      });
    }
    document.addEventListener('keydown', function(ev) {
      if (ev.key === 'Escape') closeAdrDialog();
    });
  }

  function enhanceAdrReferences(root) {
    var anchors = root.querySelectorAll('a[href*="adr/"], a[href*="ADR-"]');
    for (var ai = 0; ai < anchors.length; ai++) {
      var a = anchors[ai];
      var m = (a.textContent + ' ' + a.getAttribute('href')).match(/ADR-?(\d{4})|\/(\d{4})-/i);
      if (!m) continue;
      var num = m[1] || m[2];
      var id = 'ADR-' + num;
      if (!ADR_DATA[id]) continue;
      a.classList.add('adr-link');
      a.setAttribute('data-adr', id);
      a.setAttribute('href', '#' + id.toLowerCase());
      a.removeAttribute('target');
      a.removeAttribute('rel');
    }

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node) {
        if (!node.nodeValue || !/ADR-\d{4}/.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
        var parent = node.parentElement;
        if (!parent) return NodeFilter.FILTER_REJECT;
        if (parent.closest('pre, code, a, button, script, style, .guide-decision-panel, .adr-dialog-backdrop')) {
          return NodeFilter.FILTER_REJECT;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    var nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    for (var ni = 0; ni < nodes.length; ni++) {
      var textNode = nodes[ni];
      var text = textNode.nodeValue;
      var frag = document.createDocumentFragment();
      var last = 0;
      text.replace(/ADR-\d{4}/g, function(match, offset) {
        if (!ADR_DATA[match]) return match;
        if (offset > last) frag.appendChild(document.createTextNode(text.slice(last, offset)));
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'adr-ref';
        btn.setAttribute('data-adr', match);
        btn.textContent = match;
        frag.appendChild(btn);
        last = offset + match.length;
        return match;
      });
      if (last === 0) continue;
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
    }
  }

  function headingLevel(line) {
    var m = line.match(/^(#{2,6})\s+/);
    return m ? m[1].length : 0;
  }

  function stripHeadingSection(md, headingPattern) {
    var lines = md.split('\n');
    var out = [];
    var skipLevel = 0;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var level = headingLevel(line);

      if (skipLevel) {
        if (level && level <= skipLevel) {
          skipLevel = 0;
        } else {
          continue;
        }
      }

      if (headingPattern.test(line)) {
        skipLevel = level || 0;
        continue;
      }

      out.push(line);
    }

    return out.join('\n');
  }
